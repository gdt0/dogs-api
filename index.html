<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paws · Dogs API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #fafaf9;
      --bg-card: #ffffff;
      --bg-hover: #f5f5f4;
      --text: #1c1917;
      --text-muted: #78716c;
      --border: #e7e5e4;
      --accent: #292524;
      --accent-hover: #44403c;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --success: #16a34a;
      --warning: #ca8a04;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
      --shadow-hover: 0 4px 20px rgba(0,0,0,0.08);
    }
    
    body {
      font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
    
    /* Header */
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .logo-icon {
      width: 48px;
      height: 48px;
      background: var(--accent);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }
    
    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    
    .subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-top: 6px;
    }
    
    /* Add Card */
    .add-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    
    .add-card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    
    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    input[type="text"] {
      flex: 1;
      min-width: 180px;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      background: var(--bg);
      transition: all 0.15s ease;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px rgba(41, 37, 36, 0.08);
    }
    
    input[type="text"]::placeholder { color: #a8a29e; }
    
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: var(--danger-hover); }
    
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      padding: 8px 12px;
    }
    
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text); }
    
    /* Breeds Section */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .section-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    
    .count-badge {
      background: var(--bg);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }
    
    .search-box {
      position: relative;
    }
    
    .search-box input {
      width: 260px;
      padding: 10px 14px 10px 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: var(--bg-card);
      transition: all 0.15s ease;
    }
    
    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(41, 37, 36, 0.08);
    }
    
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 14px;
    }
    
    /* Dogs Grid */
    .dogs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    
    .dog-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }
    
    .dog-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    
    .dog-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: var(--bg);
      display: block;
    }
    
    .dog-image.loading {
      animation: pulse 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .dog-image-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, var(--bg) 0%, var(--bg-hover) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      opacity: 0.3;
    }
    
    .dog-content { padding: 16px; }
    
    .dog-breed {
      font-weight: 600;
      font-size: 17px;
      text-transform: capitalize;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .dog-varieties {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    
    .dog-varieties span {
      display: inline-block;
      background: var(--bg);
      padding: 3px 8px;
      border-radius: 6px;
      margin: 2px;
      font-size: 12px;
    }
    
    .dog-actions {
      display: flex;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    
    .dog-actions button {
      flex: 1;
      padding: 8px 12px;
      font-size: 13px;
      justify-content: center;
    }
    
    /* Empty State */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty h3 { font-size: 16px; margin-bottom: 4px; color: var(--text); }
    .empty p { font-size: 14px; }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      padding: 14px 24px;
      background: var(--accent);
      color: white;
      border-radius: 10px;
      font-weight: 500;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1000;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .modal.show { display: flex; }
    
    .modal-content {
      background: var(--bg-card);
      padding: 28px;
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    
    .modal h3 {
      font-size: 18px;
      margin-bottom: 20px;
    }
    
    .modal label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    
    .modal input, .modal textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      background: var(--bg);
      margin-bottom: 16px;
      transition: all 0.15s ease;
    }
    
    .modal input:focus, .modal textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--bg-card);
    }
    
    .modal textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    .modal-help {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: -12px;
      margin-bottom: 16px;
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }
    
    .modal-actions button { padding: 10px 18px; }
    
    /* Error/Success Messages */
    .message {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    
    .message.error {
      background: #fef2f2;
      color: var(--danger);
      border: 1px solid #fecaca;
    }
    
    .message.success {
      background: #f0fdf4;
      color: var(--success);
      border: 1px solid #bbf7d0;
    }
    
    /* Responsive */
    @media (max-width: 640px) {
      .container { padding: 24px 16px 60px; }
      h1 { font-size: 26px; }
      .form-row { flex-direction: column; }
      .form-row input, .form-row button { width: 100%; }
      .search-box input { width: 100%; }
      .dogs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <div class="logo-icon">🐕</div>
        <h1>Paws</h1>
      </div>
      <p class="subtitle">Dog breed database · Add, edit, explore</p>
    </header>
    
    <div class="add-card">
      <h2>Add New Breed</h2>
      <div id="message" class="message"></div>
      <div class="form-row">
        <input type="text" id="newBreed" placeholder="Breed name (e.g., golden retriever)">
        <input type="text" id="newVarieties" placeholder="Varieties (optional)">
        <button class="btn-primary" onclick="addBreed()">+ Add Breed</button>
      </div>
    </div>
    
    <div class="section-header">
      <h2>All Breeds</h2>
      <div style="display: flex; gap: 12px; align-items: center;">
        <span id="count" class="count-badge">0</span>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search" placeholder="Search breeds..." oninput="filterDogs()">
        </div>
      </div>
    </div>
    
    <div id="dogsGrid" class="dogs-grid"></div>
    <div id="empty" class="empty" style="display:none">
      <div class="empty-icon">🐾</div>
      <h3>No breeds found</h3>
      <p>Try a different search or add a new breed</p>
    </div>
  </div>
  
  <div id="toast" class="toast"></div>
  
  <div id="editModal" class="modal">
    <div class="modal-content">
      <h3>Edit Breed</h3>
      <input type="hidden" id="editBreed">
      <label>Breed Name</label>
      <input type="text" id="editBreedName">
      <label>Varieties</label>
      <textarea id="editVarieties" placeholder="miniature&#10;standard&#10;toy"></textarea>
      <p class="modal-help">Enter each variety on a new line</p>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api/dogs';
    const DOG_API = 'https://dog.ceo/api';
    let dogs = {};
    let dogImages = {};
    let imageLoadFailed = {};
    
    async function loadDogs() {
      try {
        const res = await fetch(API);
        dogs = await res.json();
        document.getElementById('count').textContent = Object.keys(dogs).length;
        renderDogs();
        prefetchImages();
      } catch (e) {
        showToast('Failed to load breeds', 'error');
      }
    }
    
    async function prefetchImages() {
      const breeds = Object.keys(dogs);
      for (const breed of breeds) {
        fetchDogImage(breed);
      }
    }
    
    async function fetchDogImage(breed) {
      if (dogImages[breed] || imageLoadFailed[breed]) return;
      
      // Map our breed names to dog.ceo format
      const apiBreed = breed.replace(/([A-Z])/g, ' $1').toLowerCase().trim();
      
      try {
        const res = await fetch(`${DOG_API}/breed/${apiBreed}/images/random`);
        const data = await res.json();
        if (data.status === 'success' && data.message) {
          dogImages[breed] = data.message;
        } else {
          imageLoadFailed[breed] = true;
        }
      } catch (e) {
        // Try alternate name formats
        const alts = [
          breed.replace(/ /g, '-'),
          breed.includes('-') ? breed.replace(/-/g, ' ') : breed + '-mix',
          breed.includes('-') ? breed.split('-')[0] : ''
        ];
        
        for (const alt of alts) {
          if (!alt || dogImages[breed]) break;
          try {
            const res = await fetch(`${DOG_API}/breed/${alt}/images/random`);
            const data = await res.json();
            if (data.status === 'success' && data.message) {
              dogImages[breed] = data.message;
              break;
            }
          } catch (_) {}
        }
        
        if (!dogImages[breed]) {
          imageLoadFailed[breed] = true;
        }
      }
    }
    
    function getDogEmoji(breed) {
      const emojis = ['🐕', '🦮', '🐩', '🐾', '🦴'];
      let hash = 0;
      for (let i = 0; i < breed.length; i++) {
        hash = breed.charCodeAt(i) + ((hash << 5) - hash);
      }
      return emojis[Math.abs(hash) % emojis.length];
    }
    
    function renderDogs(filter = '') {
      const grid = document.getElementById('dogsGrid');
      const empty = document.getElementById('empty');
      const filtered = Object.entries(dogs)
        .filter(([breed]) => breed.toLowerCase().includes(filter.toLowerCase()))
        .sort((a, b) => a[0].localeCompare(b[0]));
      
      if (filtered.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      
      empty.style.display = 'none';
      grid.innerHTML = filtered.map(([breed, varieties]) => {
        const img = dogImages[breed];
        const failed = imageLoadFailed[breed];
        
        return `
          <div class="dog-card">
            ${img && !failed 
              ? `<img src="${img}" class="dog-image loading" alt="${breed}" 
                   onload="this.classList.remove('loading')" 
                   onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                 <div class="dog-image-placeholder" style="display:none">${getDogEmoji(breed)}</div>`
              : `<div class="dog-image-placeholder">${getDogEmoji(breed)}</div>`
            }
            <div class="dog-content">
              <div class="dog-breed">${breed}</div>
              <div class="dog-varieties">
                ${varieties && varieties.length > 0 
                  ? varieties.map(v => `<span>${v}</span>`).join('')
                  : '<span style="opacity:0.5">No varieties</span>'}
              </div>
              <div class="dog-actions">
                <button class="btn-ghost" onclick="editBreed('${breed}')">Edit</button>
                <button class="btn-danger" onclick="deleteBreed('${breed}')">Delete</button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    function filterDogs() {
      const filter = document.getElementById('search').value;
      renderDogs(filter);
    }
    
    async function addBreed() {
      const breedInput = document.getElementById('newBreed');
      const varietiesInput = document.getElementById('newVarieties');
      const breed = breedInput.value.trim().toLowerCase();
      const varietiesStr = varietiesInput.value.trim();
      
      if (!breed) {
        showMessage('Please enter a breed name', 'error');
        return;
      }
      
      const varieties = varietiesStr 
        ? varietiesStr.split(/[,\n]/).map(v => v.trim()).filter(v => v)
        : [];
      
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ breed, varieties })
        });
        
        const data = await res.json();
        
        if (res.status === 409) {
          showMessage('Breed already exists', 'error');
          return;
        }
        
        if (!res.ok) {
          showMessage(data.error || 'Failed to add breed', 'error');
          return;
        }
        
        breedInput.value = '';
        varietiesInput.value = '';
        hideMessage();
        await loadDogs();
        showToast('Breed added successfully!', 'success');
      } catch (e) {
        showMessage('Failed to add breed. Please try again.', 'error');
      }
    }
    
    function editBreed(breed) {
      document.getElementById('editBreed').value = breed;
      document.getElementById('editBreedName').value = breed;
      document.getElementById('editVarieties').value = (dogs[breed] || []).join('\n');
      document.getElementById('editModal').classList.add('show');
    }
    
    function closeModal() {
      document.getElementById('editModal').classList.remove('show');
    }
    
    async function saveEdit() {
      const oldBreed = document.getElementById('editBreed').value;
      const newBreed = document.getElementById('editBreedName').value.trim().toLowerCase();
      const varietiesStr = document.getElementById('editVarieties').value;
      
      if (!newBreed) {
        showMessage('Please enter a breed name', 'error');
        return;
      }
      
      const varieties = varietiesStr 
        ? varietiesStr.split(/[,\n]/).map(v => v.trim()).filter(v => v)
        : [];
      
      try {
        if (oldBreed !== newBreed) {
          await fetch(`${API}/${oldBreed}`, { method: 'DELETE' });
          await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ breed: newBreed, varieties })
          });
        } else {
          await fetch(`${API}/${newBreed}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ varieties })
          });
        }
        
        closeModal();
        await loadDogs();
        showToast('Breed updated!', 'success');
      } catch (e) {
        showMessage('Failed to update breed', 'error');
      }
    }
    
    async function deleteBreed(breed) {
      if (!confirm(`Delete "${breed}"?`)) return;
      
      try {
        await fetch(`${API}/${breed}`, { method: 'DELETE' });
        await loadDogs();
        showToast('Breed deleted', 'success');
      } catch (e) {
        showToast('Failed to delete breed', 'error');
      }
    }
    
    function showMessage(msg, type) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.className = `message ${type}`;
      el.style.display = 'block';
    }
    
    function hideMessage() {
      document.getElementById('message').style.display = 'none';
    }
    
    function showToast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type}`;
      setTimeout(() => el.classList.add('show'), 10);
      setTimeout(() => el.classList.remove('show'), 3000);
    }
    
    // Close modal on backdrop click
    document.getElementById('editModal').addEventListener('click', (e) => {
      if (e.target.id === 'editModal') closeModal();
    });
    
    loadDogs();
  </script>
</body>
</html>
